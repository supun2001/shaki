<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Very Important Question 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a0025 0%, #0d0015 100%);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* ── Stars ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50%       { opacity: var(--op, 0.8); transform: scale(1.2); }
    }

    /* ── Hearts rain ── */
    .heart-rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .falling-heart {
      position: absolute;
      top: -60px;
      font-size: var(--sz, 20px);
      animation: fall var(--fd, 6s) linear infinite;
      opacity: 0.6;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3.5rem 4rem 8rem 4rem; /* Extends bottom padding to fit the No button */
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 100, 150, 0.3);
      border-radius: 2.5rem;
      box-shadow:
        0 0 60px rgba(255, 60, 120, 0.25),
        inset 0 0 60px rgba(255, 0, 100, 0.05);
      animation: cardIn 1s ease-out both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    .ring-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 0.5rem;
      animation: ring-bounce 2s ease-in-out infinite;
    }
    @keyframes ring-bounce {
      0%, 100% { transform: translateY(0) rotate(-10deg); }
      50%       { transform: translateY(-12px) rotate(10deg); }
    }

    .question {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: #fff;
      text-shadow: 0 0 30px rgba(255, 100, 180, 0.8);
      margin-bottom: 2.5rem;
      line-height: 1.2;
    }

    .buttons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── YES button ── */
    .btn-yes {
      padding: 0.85rem 3rem;
      font-size: 1.25rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      border: none;
      border-radius: 3rem;
      cursor: pointer;
      background: linear-gradient(135deg, #ff4e8f, #ff1a6c);
      color: #fff;
      box-shadow: 0 4px 30px rgba(255, 60, 120, 0.6);
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.05em;
    }
    .btn-yes:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 40px rgba(255, 60, 120, 0.9);
    }
    .btn-yes:active { transform: scale(0.97); }

    /* ── NO button ── */
    .btn-no {
      padding: 0.85rem 3rem;
      font-size: 1.25rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 3rem;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255,255,255,0.7);
      position: fixed;   /* position fixed so it can roam anywhere */
      transition: transform 0.15s;
      letter-spacing: 0.05em;
      user-select: none;
      z-index: 20;
    }
    .btn-no:hover { transform: scale(1.05); }

    /* ── YES screen ── */
    .yes-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: radial-gradient(ellipse at center, #1a0025 0%, #0d0015 100%);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      animation: fadeIn 0.6s ease both;
    }
    .yes-screen.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .yes-emoji {
      font-size: 5rem;
      animation: pop 0.5s ease both;
    }
    @keyframes pop {
      0%   { transform: scale(0); }
      70%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .yes-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: #fff;
      text-shadow: 0 0 40px rgba(255, 100, 200, 1);
      margin: 1.2rem 0 0.5rem;
    }
    .yes-sub {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.03em;
    }

    /* confetti particles */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 14px;
      top: -20px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 200;
      animation: confetti-fall var(--cf-dur, 3s) linear var(--cf-delay, 0s) infinite;
    }
    @keyframes confetti-fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 🌟 Stars -->
  <div class="stars" id="stars"></div>

  <!-- 💗 Heart Rain -->
  <div class="heart-rain" id="heartRain"></div>

  <!-- 💍 Main Card -->
  <div class="card" id="mainCard">
    <span class="ring-emoji">💍</span>
    <p class="question">Will You<br>Marry Me?</p>
    <div class="buttons">
      <button class="btn-yes" id="yesBtn" onclick="sayYes()">Yes! 💖</button>
    </div>
  </div>

  <!-- The runaway NO button (outside card, fixed) -->
  <button class="btn-no" id="noBtn">No 🙈</button>

  <!-- ✨ YES screen -->
  <div class="yes-screen" id="yesScreen">
    <div class="yes-emoji">🥂💍🎉</div>
    <p class="yes-title">She Said Yes!! 🎊</p>
    <p class="yes-sub">This is the beginning of forever ♾️❤️</p>
  </div>

<script>
  /* ── Generate Stars ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${(Math.random()*4+2).toFixed(1)}s;
      --op:${(Math.random()*0.6+0.3).toFixed(2)};
      animation-delay:${(Math.random()*5).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  /* ── Generate Falling Hearts ── */
  const rainEl = document.getElementById('heartRain');
  const heartEmojis = ['❤️','💕','💖','💗','💝','💓'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('div');
    h.className = 'falling-heart';
    h.textContent = heartEmojis[i % heartEmojis.length];
    h.style.cssText = `
      left:${Math.random()*100}%;
      --sz:${Math.random()*18+12}px;
      --fd:${(Math.random()*6+5).toFixed(1)}s;
      animation-delay:${(Math.random()*8).toFixed(1)}s;
    `;
    rainEl.appendChild(h);
  }

  /* ── NO Button Logic ── */
  const noBtn = document.getElementById('noBtn');
  let hasRunAway = false;

  // Place NO button initially centered below the YES button
  function initNoBtn() {
    if (hasRunAway) return;
    const yesBtn = document.getElementById('yesBtn');
    const yesRect = yesBtn.getBoundingClientRect();
    const noBtnW = noBtn.offsetWidth;
    // Center the No button under Yes, with a small gap
    noBtn.style.left = (yesRect.left + yesRect.width / 2 - noBtnW / 2) + 'px';
    noBtn.style.top  = (yesRect.bottom + 16) + 'px';
  }
  initNoBtn();
  window.addEventListener('resize', initNoBtn);

  function runAway() {
    hasRunAway = true;
    const btnW = noBtn.offsetWidth + 20;
    const btnH = noBtn.offsetHeight + 20;
    const maxX = window.innerWidth  - btnW;
    const maxY = window.innerHeight - btnH;
    const newX = Math.random() * maxX;
    const newY = Math.random() * maxY;
    noBtn.style.left = newX + 'px';
    noBtn.style.top  = newY + 'px';
  }

  // run on hover AND on touchstart (mobile)
  noBtn.addEventListener('mouseover', runAway);
  noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); runAway(); }, { passive: false });
  noBtn.addEventListener('click', runAway);   // extra safety – still runs away

  /* ── YES ── */
  function sayYes() {
    document.getElementById('yesScreen').classList.add('show');
    launchConfetti();
  }

  function launchConfetti() {
    const colors = ['#ff4e8f','#ff1a6c','#ff9de2','#ffd6e7','#c084fc','#a855f7','#fbbf24','#34d399'];
    for (let i = 0; i < 80; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.cssText = `
        left:${Math.random()*100}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        --cf-dur:${(Math.random()*2+2).toFixed(1)}s;
        --cf-delay:${(Math.random()*3).toFixed(1)}s;
        transform:rotate(${Math.random()*360}deg);
        opacity:${Math.random()*0.5+0.5};
      `;
      document.body.appendChild(p);
    }
  }
</script>
</body>
</html>
